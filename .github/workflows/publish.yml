name: Publish @feathq/web-sdk

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn install
      - run: yarn build
      # Pack + publish via npm so the OIDC trusted-publisher exchange runs
      # through npm CLI's native flow. yarn pack would produce an
      # equivalent tarball but routing the publish through npm avoids any
      # yarn-side auth interception.
      - run: npm publish --provenance --access public
